<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Hirun Chamara — Software Engineering student and astronomy enthusiast, building across web, web3 and robotics">
  <title>Hirun Chamara — Software Engineering student · Astronomy dreamer</title>

  <defs>
    <!-- ── gradients ───────────────────────────────────────────── -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#0b0620"/>
      <stop offset="0.55" stop-color="#150a30"/>
      <stop offset="1"   stop-color="#05030f"/>
    </linearGradient>
    <radialGradient id="nebA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ec4899" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0"    stop-color="#fff7ed"/>
      <stop offset="0.35" stop-color="#fcd34d"/>
      <stop offset="0.72" stop-color="#f97316"/>
      <stop offset="1"    stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#67e8f9"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1"   stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1"   stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="comet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5f3fc" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>

    <!-- ── filters ─────────────────────────────────────────────── -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <clipPath id="frame"><rect x="1" y="1" width="998" height="318" rx="22"/></clipPath>
    <clipPath id="typeClip"><rect x="58" y="198" width="0" height="28">
      <animate attributeName="width" values="0;414" dur="3s" begin="0.8s" fill="freeze"/>
    </rect></clipPath>

    <!-- reusable 4-point sparkle -->
    <path id="spark" d="M0,-9 Q1.2,-1.2 9,0 Q1.2,1.2 0,9 Q-1.2,1.2 -9,0 Q-1.2,-1.2 0,-9 Z"/>
  </defs>

  <style>
    @keyframes tw     { 0%,100%{opacity:.20} 50%{opacity:1} }
    @keyframes twbig  { 0%,100%{opacity:.35;transform:scale(.8)} 50%{opacity:1;transform:scale(1.15)} }
    @keyframes breathe{ 0%,100%{opacity:.65;transform:scale(1)} 50%{opacity:1;transform:scale(1.1)} }
    @keyframes corona { 0%,100%{opacity:.7;transform:scale(1)} 50%{opacity:1;transform:scale(1.14)} }
    @keyframes comet  { 0%{opacity:0;transform:translate(0,0)}
                        4%{opacity:1} 15%{opacity:1}
                        24%{opacity:0;transform:translate(430px,300px)}
                        100%{opacity:0;transform:translate(430px,300px)} }
    @keyframes track  { from{transform:translateX(0)} to{transform:translateX(414px)} }
    @keyframes blink  { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes rulepulse{ 0%,100%{opacity:.55} 50%{opacity:1} }

    .neb    { transform-box:fill-box; transform-origin:center; animation:breathe 12s ease-in-out infinite }
    .star   { animation:tw 3s ease-in-out infinite }
    .bigstar{ transform-box:fill-box; transform-origin:center; animation:twbig 4s ease-in-out infinite }
    .corona { transform-box:fill-box; transform-origin:center; animation:corona 5s ease-in-out infinite }
    .comet  { animation:comet 7s ease-in infinite }
    .cursor { animation:track 3s linear .8s forwards, blink 1s step-end .8s infinite }
    .rule   { animation:rulepulse 4s ease-in-out infinite }

    @media (prefers-reduced-motion: reduce){
      .neb,.star,.bigstar,.corona,.comet,.rule{animation:none}
      .cursor{transform:translateX(414px);animation:blink 1s step-end infinite}
    }
  </style>

  <g clip-path="url(#frame)">
    <rect x="1" y="1" width="998" height="318" fill="url(#bg)"/>

    <!-- nebula clouds -->
    <ellipse class="neb" style="animation-delay:0s"   cx="205" cy="70"  rx="300" ry="200" fill="url(#nebA)" filter="url(#blur)"/>
    <ellipse class="neb" style="animation-delay:-4s"  cx="815" cy="250" rx="280" ry="200" fill="url(#nebB)" filter="url(#blur)"/>
    <ellipse class="neb" style="animation-delay:-8s"  cx="520" cy="300" rx="240" ry="150" fill="url(#nebC)" filter="url(#blur)"/>

    <!-- faint constellation lines -->
    <g stroke="#a5b4fc" stroke-width="0.8" stroke-opacity="0.16" fill="none">
      <polyline points="300,60 360,30 432,50 500,26"/>
      <polyline points="760,26 842,44 912,60"/>
      <polyline points="150,300 232,285 320,300 400,276"/>
    </g>

    <!-- starfield -->
    <g fill="#e0e7ff">
      <circle class="star" style="animation-duration:2.6s;animation-delay:-.2s" cx="80"  cy="34"  r="1.4"/>
      <circle class="star" style="animation-duration:3.4s;animation-delay:-1.1s" cx="210" cy="28"  r="1.0"/>
      <circle class="star" style="animation-duration:2.9s;animation-delay:-.6s" cx="300" cy="60"  r="1.6" fill="#a5f3fc"/>
      <circle class="star" style="animation-duration:3.8s;animation-delay:-2.0s" cx="360" cy="30"  r="1.1"/>
      <circle class="star" style="animation-duration:2.4s;animation-delay:-.9s" cx="432" cy="50"  r="1.3"/>
      <circle class="star" style="animation-duration:3.1s;animation-delay:-1.6s" cx="500" cy="26"  r="1.5" fill="#d8b4fe"/>
      <circle class="star" style="animation-duration:2.7s;animation-delay:-.4s" cx="560" cy="55"  r="1.0"/>
      <circle class="star" style="animation-duration:3.6s;animation-delay:-2.4s" cx="620" cy="32"  r="1.3"/>
      <circle class="star" style="animation-duration:2.5s;animation-delay:-1.3s" cx="690" cy="48"  r="1.1" fill="#a5f3fc"/>
      <circle class="star" style="animation-duration:3.3s;animation-delay:-.7s" cx="842" cy="44"  r="1.2"/>
      <circle class="star" style="animation-duration:2.8s;animation-delay:-1.9s" cx="912" cy="60"  r="1.5"/>
      <circle class="star" style="animation-duration:3.5s;animation-delay:-.3s" cx="965" cy="30"  r="1.0"/>
      <circle class="star" style="animation-duration:2.6s;animation-delay:-2.2s" cx="40"  cy="108" r="1.2"/>
      <circle class="star" style="animation-duration:3.2s;animation-delay:-1.0s" cx="505" cy="98"  r="1.1" fill="#f9a8d4"/>
      <circle class="star" style="animation-duration:2.9s;animation-delay:-.5s" cx="565" cy="122" r="1.0"/>
      <circle class="star" style="animation-duration:3.7s;animation-delay:-2.6s" cx="632" cy="92"  r="1.3"/>
      <circle class="star" style="animation-duration:2.5s;animation-delay:-1.4s" cx="700" cy="112" r="1.1"/>
      <circle class="star" style="animation-duration:3.0s;animation-delay:-.8s" cx="948" cy="118" r="1.4" fill="#a5f3fc"/>
      <circle class="star" style="animation-duration:2.7s;animation-delay:-2.1s" cx="30"  cy="150" r="0.9"/>
      <circle class="star" style="animation-duration:3.4s;animation-delay:-1.2s" cx="255" cy="112" r="0.8" fill-opacity=".7"/>
      <circle class="star" style="animation-duration:2.8s;animation-delay:-.6s" cx="185" cy="205" r="0.9" fill-opacity=".7"/>
      <circle class="star" style="animation-duration:3.1s;animation-delay:-1.7s" cx="440" cy="212" r="0.9" fill-opacity=".7"/>
      <circle class="star" style="animation-duration:2.6s;animation-delay:-.9s" cx="90"  cy="270" r="1.3"/>
      <circle class="star" style="animation-duration:3.6s;animation-delay:-2.3s" cx="232" cy="285" r="1.1" fill="#d8b4fe"/>
      <circle class="star" style="animation-duration:2.4s;animation-delay:-1.5s" cx="320" cy="300" r="1.0"/>
      <circle class="star" style="animation-duration:3.3s;animation-delay:-.4s" cx="400" cy="276" r="1.4"/>
      <circle class="star" style="animation-duration:2.9s;animation-delay:-2.0s" cx="470" cy="300" r="1.0" fill="#a5f3fc"/>
      <circle class="star" style="animation-duration:3.5s;animation-delay:-1.1s" cx="540" cy="286" r="1.2"/>
      <circle class="star" style="animation-duration:2.7s;animation-delay:-.7s" cx="612" cy="304" r="1.1"/>
      <circle class="star" style="animation-duration:3.2s;animation-delay:-2.5s" cx="690" cy="286" r="1.3" fill="#f9a8d4"/>
      <circle class="star" style="animation-duration:2.5s;animation-delay:-1.3s" cx="760" cy="300" r="1.0"/>
      <circle class="star" style="animation-duration:3.7s;animation-delay:-.5s" cx="960" cy="262" r="1.4"/>
      <circle class="star" style="animation-duration:2.8s;animation-delay:-1.8s" cx="50"  cy="298" r="1.0"/>
    </g>

    <!-- sparkle stars -->
    <g fill="#ffffff" filter="url(#softglow)">
      <use href="#spark" class="bigstar" style="animation-delay:-.3s"  x="140" y="52"  transform="translate(140,52) scale(0.9)"/>
      <use href="#spark" class="bigstar" style="animation-delay:-1.6s" x="908" y="60"  transform="translate(908,60) scale(0.8)" fill="#a5f3fc"/>
      <use href="#spark" class="bigstar" style="animation-delay:-2.4s" x="612" y="118" transform="translate(612,118) scale(0.6)" fill="#f9a8d4"/>
    </g>

    <!-- ── orbital system (signature) ──────────────────────────── -->
    <g transform="translate(818,162) rotate(-16)">
      <!-- rings -->
      <g fill="none" stroke-opacity="0.5">
        <ellipse rx="48"  ry="22" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.35"/>
        <ellipse rx="78"  ry="36" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.30"/>
        <ellipse rx="112" ry="52" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.25"/>
      </g>

      <!-- sun -->
      <circle class="corona" r="30" fill="url(#sun)"/>
      <circle r="15" fill="#fde68a" filter="url(#glow)"/>

      <!-- planets -->
      <circle r="3.5" fill="#67e8f9" filter="url(#softglow)">
        <animateMotion dur="9s" repeatCount="indefinite" rotate="none"
          path="M -48,0 a 48,22 0 1,0 96,0 a 48,22 0 1,0 -96,0"/>
      </circle>
      <circle r="6" fill="#c084fc" filter="url(#softglow)">
        <animateMotion dur="16s" begin="-5s" repeatCount="indefinite" rotate="none"
          path="M -78,0 a 78,36 0 1,0 156,0 a 78,36 0 1,0 -156,0"/>
      </circle>
      <g filter="url(#softglow)">
        <animateMotion dur="26s" begin="-11s" repeatCount="indefinite" rotate="none"
          path="M -112,0 a 112,52 0 1,0 224,0 a 112,52 0 1,0 -224,0"/>
        <ellipse rx="15" ry="4.5" fill="none" stroke="#f9a8d4" stroke-width="1.4" transform="rotate(-24)"/>
        <circle r="8" fill="#f472b6"/>
      </g>
    </g>

    <!-- ── comet ───────────────────────────────────────────────── -->
    <g class="comet">
      <g transform="translate(150,20)">
        <line x1="0" y1="0" x2="-46" y2="-32" stroke="url(#comet)" stroke-width="2.4" stroke-linecap="round"/>
        <circle r="2.6" fill="#ffffff" filter="url(#glow)"/>
      </g>
    </g>

    <!-- ── text ────────────────────────────────────────────────── -->
    <text x="60" y="92" font-family="ui-monospace,'Cascadia Code','Consolas',monospace"
          font-size="13" letter-spacing="3" fill="#67e8f9" opacity="0.92">◆ SOFTWARE ENGINEERING STUDENT · ASTRONOMY DREAMER</text>

    <text x="57" y="160" font-family="'Segoe UI','Helvetica Neue',system-ui,Arial,sans-serif"
          font-size="62" font-weight="800" letter-spacing="1.5"
          fill="url(#name)" filter="url(#glow)">HIRUN CHAMARA</text>

    <g clip-path="url(#typeClip)">
      <text x="60" y="219" font-family="ui-monospace,'Cascadia Code','Consolas',monospace"
            font-size="16" fill="#c4b5fd">&gt; web · web3 · robotics · chasing the stars</text>
    </g>
    <rect class="cursor" x="60" y="205" width="3" height="18" rx="1" fill="#22d3ee"/>

    <rect class="rule" x="60" y="238" width="420" height="2.5" rx="1.25" fill="url(#rule)"/>

    <!-- border -->
    <rect x="1.5" y="1.5" width="997" height="317" rx="21.5" fill="none" stroke="#4c1d95" stroke-opacity="0.55" stroke-width="1.5"/>
  </g>
</svg>
