name: 🌠 Contribution comet

# Regenerates an animated SVG of Hirun's real contribution graph.
# Output is pushed to the `output` branch and embedded in the README.

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day — keeps the graph current
  workflow_dispatch:          # lets you run it manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: contribution-comet
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate cosmic snake animations
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-cosmic.svg?color_snake=#f472b6&color_dots=#150a30,#3b0764,#7c3aed,#a855f7,#22d3ee
            dist/github-snake-light.svg?palette=github-light

      - name: Publish to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
